spring:
  application:
    name: LangChain4j-Code-Platform

server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: io.github.jukomu.langchain4jcodeplatform.controller

# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn